<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mazemaker — Architect Mirror</title>
<style>
  :root {
    --bg:        #06060a;
    --bg-elev:   #0c0c14;
    --hud:       rgba(8, 8, 14, 0.72);
    --border:    rgba(120, 120, 150, 0.18);
    --text:      #ededf2;
    --text-mute: #9a9aa8;
    --text-dim:  #5e5e6b;
    --accent:    #bf00ff;
    --accent-hi: #d633ff;
    --font:      "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* The mirror canvas fills the viewport */
  #mirror {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    background:
      radial-gradient(circle at 50% 50%, rgba(191, 0, 255, 0.04) 0%, transparent 60%),
      var(--bg);
    cursor: crosshair;
  }

  /* Top HUD strip */
  .hud-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: 48px;
    background: var(--hud);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 1.4rem;
    gap: 2rem;
    z-index: 10;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .hud-top .brand {
    color: var(--accent-hi);
    font-weight: 600;
    letter-spacing: 0.12em;
  }
  .hud-top .stats { display: flex; gap: 2rem; color: var(--text-mute); }
  .hud-top .stats span strong { color: var(--text); margin-left: 0.4em; }
  .hud-top .phase {
    margin-left: auto;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    transition: all 0.4s ease;
  }
  .hud-top .phase.NREM { color: #ffd700; border-color: rgba(255, 215, 0, 0.4); box-shadow: 0 0 18px rgba(255, 215, 0, 0.25) inset; }
  .hud-top .phase.REM { color: #ff6ad5; border-color: rgba(255, 106, 213, 0.4); box-shadow: 0 0 18px rgba(255, 106, 213, 0.25) inset; }
  .hud-top .phase.INSIGHT { color: #76d9ff; border-color: rgba(118, 217, 255, 0.4); box-shadow: 0 0 18px rgba(118, 217, 255, 0.25) inset; }
  .hud-top .phase.IDLE { color: var(--text-dim); }

  /* Legend / agent panel — bottom-left */
  .legend {
    position: fixed; bottom: 1.2rem; left: 1.2rem;
    background: var(--hud);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    font-family: var(--font-mono);
    font-size: 0.74rem;
    z-index: 10;
    min-width: 200px;
  }
  .legend h3 {
    color: var(--text-dim);
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    font-weight: 500;
  }
  .legend-row {
    display: flex; align-items: center;
    gap: 0.6rem;
    padding: 2px 0;
    color: var(--text-mute);
  }
  .legend-row.muted { opacity: 0.4; }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex: 0 0 8px;
    box-shadow: 0 0 6px currentColor;
  }
  .legend-name { flex: 1; color: var(--text); }
  .legend-count { color: var(--text-dim); font-variant-numeric: tabular-nums; }

  /* Event log — bottom-right */
  .log {
    position: fixed; bottom: 1.2rem; right: 1.2rem;
    width: 380px;
    max-height: 240px;
    overflow: hidden;
    background: var(--hud);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    z-index: 10;
    color: var(--text-mute);
  }
  .log h3 {
    color: var(--text-dim);
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    font-weight: 500;
  }
  .log-row {
    display: flex; gap: 0.6rem;
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-row .t { color: var(--text-dim); flex: 0 0 auto; }
  .log-row .lbl { color: var(--text); overflow: hidden; text-overflow: ellipsis; }
  .log-row .agent { font-weight: 600; }

  /* Dream-phase ribbon (animates in/out) */
  .ribbon {
    position: fixed;
    top: 60px; left: 50%; transform: translateX(-50%);
    padding: 0.5rem 1.4rem;
    background: var(--bg-elev);
    border: 1px solid var(--accent-hi);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-hi);
    z-index: 9;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    box-shadow: 0 0 32px rgba(191, 0, 255, 0.4);
  }
  .ribbon.active { opacity: 1; }

  .ws-status {
    position: fixed; top: 56px; right: 1.2rem;
    z-index: 10;
    font-family: var(--font-mono);
    font-size: 0.66rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .ws-status.live { color: #4af589; }
  .ws-status.live::before { content: "● "; }
  .ws-status.dead { color: #ff5555; }
  .ws-status.dead::before { content: "● "; }
</style>
</head>
<body>
<canvas id="mirror"></canvas>

<div class="hud-top">
  <span class="brand">⌬ ARCHITECT MIRROR</span>
  <div class="stats">
    <span>memories <strong id="stat-mem">0</strong></span>
    <span>edges <strong id="stat-edge">0</strong></span>
    <span>events/s <strong id="stat-rate">0</strong></span>
  </div>
  <div class="phase IDLE" id="phase-pill">IDLE</div>
</div>

<div class="ws-status dead" id="ws-status">connecting</div>

<div class="ribbon" id="ribbon"></div>

<div class="legend">
  <h3>Agents</h3>
  <div id="legend-rows"></div>
</div>

<div class="log">
  <h3>Activity stream</h3>
  <div id="log-rows"></div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
const D = __DATA_JSON__;   // server bootstrap (stats only used)
let palette = {};
const agents = {};          // agent → { count, color, lastSeen }
const liveNodes = new Map();  // id → { x, y, agent, color, life, label }
const liveEdges = [];        // [{ srcId, dstId, agent, color, life, type }]
let logRows = [];

let phase = "IDLE";
let phasePill = document.getElementById("phase-pill");
let ribbon = document.getElementById("ribbon");
let statMem = document.getElementById("stat-mem");
let statEdge = document.getElementById("stat-edge");
let statRate = document.getElementById("stat-rate");
let wsStatus = document.getElementById("ws-status");
let logRowsEl = document.getElementById("log-rows");
let legendRowsEl = document.getElementById("legend-rows");

// ═══════════════════════════════════════════════════════════
// Canvas + render loop
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById("mirror");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, dpr = window.devicePixelRatio || 1;
function resize() {
  W = canvas.width = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
}
window.addEventListener("resize", resize);
resize();

// Place a new node somewhere in the viewport with a force-ish bias
// toward the agent's "lane" so each agent's traces stay clustered.
const AGENT_LANES = {};      // agent → [centerX, centerY, radius]
function _laneFor(agent) {
  if (!AGENT_LANES[agent]) {
    // Deterministic lane center per agent name (hash → angle).
    let h = 0;
    for (let i = 0; i < agent.length; i++) h = (h * 31 + agent.charCodeAt(i)) >>> 0;
    const a = (h / 0xffffffff) * Math.PI * 2;
    const r = Math.min(W, H) * 0.30;
    AGENT_LANES[agent] = [W/2 + Math.cos(a) * r, H/2 + Math.sin(a) * r, Math.min(W,H) * 0.18];
  }
  return AGENT_LANES[agent];
}
function _placeInLane(agent) {
  const [cx, cy, R] = _laneFor(agent);
  const a = Math.random() * Math.PI * 2;
  const r = Math.sqrt(Math.random()) * R;
  return { x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r };
}

let lastFrameTime = performance.now();
let eventsThisSec = 0;
let rateClock = performance.now();

function frame() {
  const now = performance.now();
  const dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;

  // Subtle vignette pulse on phase
  let bg = "rgba(6, 6, 10, 1)";
  if (phase === "NREM") bg = "rgba(8, 8, 4, 1)";
  if (phase === "REM") bg = "rgba(10, 4, 8, 1)";
  if (phase === "INSIGHT") bg = "rgba(4, 8, 10, 1)";
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Edges — drawn before nodes so they sit underneath
  for (let i = liveEdges.length - 1; i >= 0; i--) {
    const e = liveEdges[i];
    e.life -= dt;
    if (e.life <= 0) { liveEdges.splice(i, 1); continue; }
    const a = liveNodes.get(e.srcId);
    const b = liveNodes.get(e.dstId);
    if (!a || !b) continue;
    const op = Math.max(0, e.life / e.lifeMax);
    ctx.strokeStyle = e.color.replace("rgb(", "rgba(").replace(")", `,${op.toFixed(2)})`);
    if (!ctx.strokeStyle.startsWith("rgba")) {
      ctx.strokeStyle = `${e.color}${Math.round(op*255).toString(16).padStart(2,'0')}`;
    }
    ctx.lineWidth = (1.2 + op * 1.5) * dpr;
    ctx.globalCompositeOperation = "lighter";
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
  ctx.globalCompositeOperation = "source-over";

  // Nodes — pulsing dots, fade slowly
  for (const [id, n] of liveNodes) {
    n.life -= dt * 0.18;
    if (n.life <= 0) { liveNodes.delete(id); continue; }

    const r = (3 + (1 - n.life) * 9) * dpr;
    const op = Math.min(1, n.life * 1.4);

    // Outer glow
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 4);
    grad.addColorStop(0, _toRGBA(n.color, op * 0.55));
    grad.addColorStop(1, _toRGBA(n.color, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r * 4, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = _toRGBA(n.color, op);
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Per-second event rate update
  if (now - rateClock > 1000) {
    statRate.textContent = eventsThisSec;
    eventsThisSec = 0;
    rateClock = now;
  }

  requestAnimationFrame(frame);
}

function _toRGBA(hex, alpha) {
  // hex like #76d9ff
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

requestAnimationFrame(frame);

// ═══════════════════════════════════════════════════════════
// Event handlers
// ═══════════════════════════════════════════════════════════

function handleMemoryAdded(ev) {
  const pos = _placeInLane(ev.agent || "Other");
  liveNodes.set(ev.id, {
    x: pos.x, y: pos.y,
    agent: ev.agent, color: ev.color || "#5e5e6b",
    life: 1.0, label: ev.label,
  });
  // Keep the live set bounded — drop oldest dim ones
  if (liveNodes.size > 600) {
    const oldest = [...liveNodes.entries()]
      .sort((a, b) => a[1].life - b[1].life)
      .slice(0, liveNodes.size - 500);
    for (const [k] of oldest) liveNodes.delete(k);
  }
  agents[ev.agent] = agents[ev.agent] || { count: 0, color: ev.color };
  agents[ev.agent].count += 1;
  agents[ev.agent].lastSeen = Date.now();
  pushLog(ev);
  eventsThisSec += 1;
}

function handleEdgeChanged(ev) {
  // Determine fade duration by reason
  let life = 1.5;
  let color = "#5e5e6b";
  if (ev.reason === "rem_bridge" || ev.reason === "insight_link") {
    color = "#ff6ad5"; life = 3.5;
  } else if (ev.reason === "nrem_strengthen" || ev.reason === "auto") {
    // Use src node's color if known
    const srcNode = liveNodes.get(ev.src);
    if (srcNode) color = srcNode.color;
    else color = "#76d9ff";
    life = 2.0;
  } else if (ev.reason === "nrem_decay") {
    color = "#ffd700"; life = 1.2;
  }
  // If either endpoint isn't currently visible, place it briefly so
  // the line has somewhere to anchor.
  if (!liveNodes.has(ev.src)) {
    const pos = _placeInLane("Other");
    liveNodes.set(ev.src, {
      x: pos.x, y: pos.y, agent: "Other", color: "#5e5e6b",
      life: 0.4, label: "",
    });
  }
  if (!liveNodes.has(ev.dst)) {
    const pos = _placeInLane("Other");
    liveNodes.set(ev.dst, {
      x: pos.x, y: pos.y, agent: "Other", color: "#5e5e6b",
      life: 0.4, label: "",
    });
  }
  liveEdges.push({
    srcId: ev.src, dstId: ev.dst,
    color, life, lifeMax: life,
  });
  if (liveEdges.length > 800) liveEdges.splice(0, liveEdges.length - 800);
  eventsThisSec += 1;
}

function handlePhaseStarted(ev) {
  phase = ev.phase || "IDLE";
  phasePill.textContent = phase;
  phasePill.className = "phase " + phase;
  ribbon.textContent = `${phase} cycle · #${ev.session_id}`;
  ribbon.className = "ribbon active";
  setTimeout(() => { ribbon.className = "ribbon"; }, 4000);
}

function handlePhaseFinished(ev) {
  const s = ev.stats || {};
  ribbon.textContent =
    `${ev.phase} done · ${s.connections_strengthened || 0}+ ` +
    `${s.connections_pruned || 0}- ${s.bridges_found || 0} bridges ` +
    `${s.insights_created || 0} insights`;
  ribbon.className = "ribbon active";
  setTimeout(() => { ribbon.className = "ribbon"; }, 6000);
  // After a short delay return phase pill to IDLE (next phase will overwrite)
  setTimeout(() => {
    if (phase === ev.phase) {
      phase = "IDLE";
      phasePill.textContent = "IDLE";
      phasePill.className = "phase IDLE";
    }
  }, 4000);
}

function pushLog(ev) {
  const ts = new Date().toLocaleTimeString("de-DE", {hour12: false});
  const lbl = (ev.label || "").substring(0, 38);
  logRows.unshift({
    ts, agent: ev.agent || "Other",
    color: ev.color || "#5e5e6b",
    label: lbl,
  });
  if (logRows.length > 12) logRows = logRows.slice(0, 12);
  logRowsEl.innerHTML = logRows.map(r =>
    `<div class="log-row"><span class="t">${r.ts}</span>` +
    `<span class="agent" style="color:${r.color}">${r.agent.toUpperCase()}</span>` +
    `<span class="lbl">${escapeHtml(r.label)}</span></div>`
  ).join("");
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

function refreshLegend() {
  const rows = Object.entries(palette).map(([name, color]) => {
    const a = agents[name];
    const muted = !a || a.count === 0;
    return `<div class="legend-row${muted ? " muted" : ""}">
      <span class="legend-dot" style="color:${color}; background:${color}"></span>
      <span class="legend-name">${name}</span>
      <span class="legend-count">${a ? a.count.toLocaleString("de-DE") : "·"}</span>
    </div>`;
  }).join("");
  legendRowsEl.innerHTML = rows;
}

function applyStats(stats) {
  if (!stats) return;
  if (typeof stats.memories === "number")
    statMem.textContent = stats.memories.toLocaleString("de-DE");
  if (typeof stats.connections === "number")
    statEdge.textContent = stats.connections.toLocaleString("de-DE");
}

// ═══════════════════════════════════════════════════════════
// Bootstrap + WebSocket
// ═══════════════════════════════════════════════════════════
async function init() {
  applyStats(D && D.stats);

  // Fetch palette
  try {
    const r = await fetch("/api/mirror/agents", {credentials: "same-origin"});
    const j = await r.json();
    palette = j.palette || {};
  } catch {
    palette = { Other: "#5e5e6b" };
  }
  refreshLegend();
  setInterval(refreshLegend, 1500);

  connect();
}

let ws = null;
function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(proto + "//" + location.host + "/ws/stream");
  ws.onopen = () => { wsStatus.className = "ws-status live"; wsStatus.textContent = "live"; };
  ws.onclose = () => {
    wsStatus.className = "ws-status dead"; wsStatus.textContent = "reconnecting";
    setTimeout(connect, 1500);
  };
  ws.onerror = () => { /* close handler will reconnect */ };
  ws.onmessage = (m) => {
    let msg;
    try { msg = JSON.parse(m.data); } catch { return; }
    if (msg.type === "update") {
      applyStats(msg.stats);
    } else if (msg.type === "mirror_events") {
      for (const ev of msg.events || []) {
        if (ev.t === "memory.added") handleMemoryAdded(ev);
        else if (ev.t === "edge.changed") handleEdgeChanged(ev);
        else if (ev.t === "dream.phase.started") handlePhaseStarted(ev);
        else if (ev.t === "dream.phase.finished") handlePhaseFinished(ev);
      }
    }
  };
}

init();
</script>
</body>
</html>
